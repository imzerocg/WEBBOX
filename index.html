<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>WebBox - Anime Auto-Battler</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Start Screen Specific CSS */
        #start-screen { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(10px); z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .modal { background: linear-gradient(145deg, #1a1a1a, #0a0a0a); padding: 50px; border-radius: 12px; border: 2px solid #333; box-shadow: 0 10px 40px rgba(0,0,0,0.8); max-width: 600px; width: 90%; }
        .modal h1 { color: #f1c40f; margin-top: 0; font-size: 3em; text-transform: uppercase; letter-spacing: 3px; text-shadow: 2px 2px 0px #000; }
        .modal p { color: #ddd; line-height: 1.6; font-size: 1.1em; margin-bottom: 25px; }
        .credits { background: #111; padding: 15px; border-radius: 8px; border: 1px solid #222; margin-bottom: 30px; text-align: left; }
        .credits p { margin: 5px 0; font-size: 0.95em; color: #aaa; }
        .credits span { color: #3498db; font-weight: bold; }
        .play-btn { background: #27ae60; color: white; border: none; padding: 15px 50px; font-size: 1.6em; font-weight: bold; border-radius: 8px; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 15px rgba(39, 174, 96, 0.3); text-transform: uppercase; }
        .play-btn:hover { background: #2ecc71; transform: translateY(-3px); box-shadow: 0 6px 20px rgba(39, 174, 96, 0.5); }
    </style>
</head>
<body>

    <div id="start-screen">
        <div class="modal">
            <h1>WebBox</h1>
            <p>The ultimate 2D Anime Auto-Battler simulator. Build civilizations, harness elemental powers, and watch legendary anime gods clash in massive simulated wars.</p>
            
            <div class="credits">
                <p>Developed by: <span>Scourge/SFH/Falah</span></p>
                <p>Version: <span>21.0 (The Ultimate Merge)</span></p>
                <p>Date: <span>April 23, 2026</span></p>
            </div>
            
            <button class="play-btn" onclick="startGame()">Play Game</button>
        </div>
    </div>

    <div id="sidebar">
        <h2>WEBBOX</h2>
        <div class="stat-panel">
            <b style="font-size:1.1em">Total Units: <span id="total-count" style="color:#2ecc71">0</span></b><br>
            Tool: <span id="current-tool" style="color:#f1c40f;">Normal</span>
        </div>
        
        <button id="teamToggle" onclick="toggleTeam()" class="team-btn" style="background:#3498db">Team: BLUE</button>
        <div class="grid-2">
            <button onclick="toggleCiv()" id="civBtn" style="background:#8e44ad">Civ: ON</button>
            <button onclick="toggleWall()" id="wallBtn" style="background:#c0392b">Wall: CLOSED</button>
        </div>
        <hr>
        <div class="grid-2">
            <button onclick="setPower('spawn-normal', this)" class="active">Normal</button>
            <button onclick="setPower('spawn-archer', this)">Archer</button>
            <button onclick="setPower('spawn-knight', this)">Knight</button>
            <button onclick="setPower('spawn-ninja', this)">Ninja</button>
            <button onclick="setPower('spawn-swapper', this)">Swapper</button>
            <button onclick="setPower('spawn-shifter', this)">Shifter</button>
            <button onclick="setPower('spawn-elephant', this)">Elephant</button>
            <button onclick="setPower('cannon', this)">Cannon</button>
        </div>
        <hr>
        <div class="grid-2">
            <button onclick="setPower('spawn-luffy', this)" class="anime-btn">Luffy</button>
            <button onclick="setPower('spawn-gojo', this)" class="anime-btn">Gojo</button>
            <button onclick="setPower('spawn-naruto', this)" class="anime-btn">Naruto</button>
            <button onclick="setPower('spawn-goku', this)" class="anime-btn">Goku</button>
        </div>
        <hr>
        <div class="grid-2">
            <button onclick="setPower('weapon', this)">🗡️ Weapon</button>
            <button onclick="setPower('strike', this)">⚡ Smite</button>
            <button onclick="setPower('fire', this)">🔥 Fire</button>
            <button onclick="setPower('ice', this)">❄️ Ice</button>
            <button onclick="setPower('light', this)">✨ Light</button>
            <button onclick="setPower('wind', this)">🌪️ Wind</button>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        function startGame() {
            document.getElementById('start-screen').style.display = 'none';
        }
    </script>

    <script src="js/civilization.js"></script>
    <script src="js/others.js"></script>
    <script src="js/units.js"></script>
    <script src="js/engine.js"></script>
    
</body>
</html>
